<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" fill="none">
  <!-- Diamant 3D - 4 faces avec dégradé de bleu -->
  <!-- Face haut-gauche : bleu vif -->
  <polygon points="50,4 4,52 50,56" fill="#60A5FA"/>
  <!-- Face haut-droite : bleu medium -->
  <polygon points="50,4 96,52 50,56" fill="#2563EB"/>
  <!-- Face bas-gauche : bleu foncé -->
  <polygon points="4,52 50,56 50,108" fill="#1D4ED8"/>
  <!-- Face bas-droite : bleu marine -->
  <polygon points="96,52 50,56 50,108" fill="#1E3A8A"/>
</svg>
